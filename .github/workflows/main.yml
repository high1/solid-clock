name: Build and Deploy 🕛
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BASE: /${{ github.event.repository.name }}/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6.0.2

      - name: Pnpm 🧱
        uses: pnpm/action-setup@v6.0.8

      - name: Node.js ⚓
        uses: actions/setup-node@v6.4.0
        with:
          node-version: node
          cache: pnpm

      - name: Install 🔧
        run: pnpm i

      - name: Install playwright 🌐
        run: pnpm playwright

      - name: Test 🧪
        run: pnpm test

      - name: Build 🚧
        run: |
          pnpm build
          touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        if: github.ref == 'refs/heads/main'
        with:
          folder: dist
